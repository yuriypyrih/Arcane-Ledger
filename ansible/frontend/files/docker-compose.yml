services:
  al-frontend:
    image: lausi95/arcane-ledger-frontend
    networks: [traefik]
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.tcm.rule=Host(`arcane-ledger.com`)
      - traefik.http.routers.tcm.entrypoints=websecure
      - traefik.http.routers.tcm.tls.certresolver=letsencrypt

networks:
  traefik:
    external: true
    name: traefik
