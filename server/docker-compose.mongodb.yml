services:
  mongodb:
    image: ${MONGO_IMAGE:-mongo:7.0}
    container_name: ${MONGO_CONTAINER_NAME:-dad-companion-mongo}
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-dnd_companion}
    command: ["--bind_ip_all"]
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--username",
          "${MONGO_INITDB_ROOT_USERNAME}",
          "--password",
          "${MONGO_INITDB_ROOT_PASSWORD}",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand({ ping: 1 })"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - dad_companion_mongo_data:/data/db

volumes:
  dad_companion_mongo_data:
