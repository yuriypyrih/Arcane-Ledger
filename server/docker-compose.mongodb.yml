services:
  mongodb:
    image: mongo:7.0
    container_name: arcane-ledger-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: arcane_ledger
    command: ["--bind_ip_all"]
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--username",
          "${MONGO_INITDB_ROOT_USERNAME}",
          "--password",
          "${MONGO_INITDB_ROOT_PASSWORD}",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand({ ping: 1 })"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - arcane_ledger_mongo_data:/data/db

volumes:
  arcane_ledger_mongo_data:
